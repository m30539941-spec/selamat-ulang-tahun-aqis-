<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Aqiss</title>

<style>
body{
  margin:0;
  overflow:hidden;
  height:100vh;
  background: radial-gradient(circle,#ff9a9e,#fad0c4,#fbc2eb);
  font-family: Arial, sans-serif;
  color:white;
}

/* CENTER CARD */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
}

h1{
  font-size:32px;
  text-shadow:0 0 10px #ff4da6, 0 0 20px #ff4da6;
}

#text{
  font-size:14px;
  max-width:320px;
  margin-top:10px;
  line-height:1.5;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background:#ff4da6;
  color:white;
  font-weight:bold;
}

/* HEART */
.heart{
  position:absolute;
  top:-10px;
  color:#ff2d75;
  animation: fall linear forwards;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

/* CONFETTI */
canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:1;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="center">
  <h1>💖 HAPPY BIRTHDAY AQISS 💖</h1>
  <p id="text"></p>

  <!-- MUSIC -->
  <audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <button onclick="document.getElementById('music').play()">
    🎵 Play Music
  </button>

  <button onclick="alert('Semoga kamu selalu bahagia, sehat, dan semua cita-citamu tercapai 🤍 - dari rapipp')">
    💌 Open Message
  </button>
</div>

<script>
// ===== TEXT (FIXED) =====
const msg = "selamat ulang tahun aqiss, semoga panjang umur dan sehatt selaluu serta jaga kesehatan dan semangat dalam meraih cita cita nya. oiyaa dan satu lagi semogaa kamuuu langgeng teruss nyaa samaa bg wazzaa semogaa kamuuu happyy makasiiii yaaa udaa bacaaa🤍 dari rapipp";

let i = 0;
function typing(){
  if(i < msg.length){
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typing,45);
  }
}
typing();

// ===== LOVE FALL =====
function love(){
  const el = document.createElement("div");
  el.classList.add("heart");
  el.innerHTML = "💖";
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (Math.random()*20+10) + "px";
  el.style.animationDuration = (Math.random()*3+2) + "s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),5000);
}
setInterval(love,120);

// ===== CONFETTI =====
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for(let i=0;i<120;i++){
  pieces.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6+2,
    d: Math.random()*2+1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  for(let i=0;i<pieces.length;i++){
    let p = pieces[i];
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    ctx.fill();

    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  }
}
setInterval(draw,20);
</script>

</body>
</html>
